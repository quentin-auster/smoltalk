# @package callbacks
- _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: null          # let Trainer/Logger decide or set from code to run dir
  filename: "epoch{epoch:02d}-step{step}"
  save_last: true
  save_top_k: 3
  monitor: "val_loss"
  mode: "min"

- _target_: lightning.pytorch.callbacks.LearningRateMonitor
  logging_interval: "step"

- _target_: project.train.callbacks.RcloneSyncCallback
  every_n_epochs: 200

- _target_: project.train.callbacks.FourierLoggingCallback
  modulus: ${oc.select:data.modulus,null}
  every_n_epochs: 100
  n_top: 10
