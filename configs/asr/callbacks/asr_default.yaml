# Default callbacks for ASR training

model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  monitor: val_loss
  mode: min
  save_last: true
  save_top_k: 3
  filename: "asr-epoch{epoch:04d}-val_loss{val_loss:.4f}"

lr_monitor:
  _target_: lightning.pytorch.callbacks.LearningRateMonitor
  logging_interval: step
